{% extends "base.html" %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card">
        <div class="ticket-header">
            <h2>Create New Support Ticket</h2>
        </div>
        
        <form action="{{ url_for('create_ticket') }}" method="POST">
            <div class="form-group">
                <label for="title">Ticket Subject</label>
                <input type="text" id="title" name="title" required placeholder="Brief summary of the issue">
            </div>
            
            <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="category">Category</label>
                    <select id="category" name="category" required>
                        <option value="Technical">Technical Issue</option>
                        <option value="Billing">Billing & Subscriptions</option>
                        <option value="General">General Inquiry</option>
                        <option value="Feature Request">Feature Request</option>
                    </select>
                </div>
                
                <div class="form-group" style="flex: 1; min-width: 200px;">
                    <label for="priority">Priority</label>
                    <select id="priority" name="priority" required>
                        <option value="Low">Low</option>
                        <option value="Medium" selected>Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label for="description">Detailed Description</label>
                <textarea id="description" name="description" rows="6" required placeholder="Please describe your issue in detail..."></textarea>
            </div>
            
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit Ticket</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
